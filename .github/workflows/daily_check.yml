name: Daily ETF Premium Check

on:
  schedule:
    - cron: '30 17 * * 1-5'  # 11:00 PM IST, Mon-Fri
  workflow_dispatch:  # lets you trigger it manually too

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to commit the CSV file, but blocks everything else
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python etf_premium_tracker.py
      - run: python generate_chart.py
      # NEW STEP: Sends the daily CSV file to your secondary email
      - name: Send email with CSV attachment
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Daily ETF Premium/Discount Report
          to: Venkatavamsi1999@gmail.com
          from: ETF Tracker Bot
          body: |
            Hi,
            
            The daily ETF Premium/Discount tracker has completed successfully. 
            Please find the updated log file attached.
            
            Regards,
            GitHub Actions Bot
          attachments: etf_premium_log.csv
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Daily ETF premium update"
